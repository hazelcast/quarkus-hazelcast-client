name: CI

on:
  push:
    paths-ignore:
      - '**.md'
  pull_request:
    paths-ignore:
      - '**.md'

jobs:
  build-jvm:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        java: [ 17 ]

    steps:
      - uses: actions/checkout@v6
      - name: Install JDK ${{ matrix.java }}
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: ${{ matrix.java }}
          cache: 'maven'

      - name: Build on JVM
        run: ./mvnw -B verify

  get-hazelcast-versions:
      runs-on: ubuntu-slim
      outputs:
          versions: ${{ steps.versions.outputs.versions }}
      steps:
        - id: get-maintenance-versions
          uses: hazelcast/hazelcast/.github/actions/get-supported-maintenance-versions@master
        - id: versions
          run: |
              echo "versions=$(jq --compact-output 'map(. | tostring + ".0")' <<< '${{ steps.get-maintenance-versions.outputs.versions }}')" >> ${GITHUB_OUTPUT}

  build-graalvm:
    needs:
      - build-jvm
      - get-hazelcast-versions
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        java: [ '21' ]
        graal: [ '23.1' ]
        hazelcast: ${{ fromJSON(needs.get-hazelcast-versions.outputs.versions) }}

    steps:
      - uses: actions/checkout@v6
      - name: Install JDK ${{ matrix.java }}
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: ${{ matrix.java }}
          cache: 'maven'

      - name: Pull Quarkus Native Builder Image ${{ matrix.graal }}-java${{ matrix.java }}
        run: docker pull quay.io/quarkus/ubi9-quarkus-mandrel-builder-image:${{ matrix.graal }}-java${{ matrix.java }}

      - name: Build against ${{ matrix.hazelcast }} on GraalVM ${{ matrix.graal }} 
        run: ./mvnw -B -Dhazelcast.version=${{ matrix.hazelcast }} verify -Dnative -Dquarkus.native.container-build=true -Dquarkus.native.builder-image=quay.io/quarkus/ubi9-quarkus-mandrel-builder-image:${{ matrix.graal }}-java${{ matrix.java }}

  build-graalvm-default:
    needs: build-jvm
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        java: [ 17 ]

    steps:
      - uses: actions/checkout@v6
      - name: Install JDK ${{ matrix.java }}
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: ${{ matrix.java }}
          cache: 'maven'

      - name: Build on default GraalVM version
        run: ./mvnw -B verify -Dnative -Dquarkus.native.container-build=true
